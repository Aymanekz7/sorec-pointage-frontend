<aside class="sidebar" [class.compact]="compact">
  <div class="brand">
    <img src="/logo_sorec.png" alt="SOREC Logo" class="brand-logo" />
  </div>

  <nav class="menu">
    <a
      *ngFor="let item of visibleItems"
      [routerLink]="item.route"
      routerLinkActive="active">
      <span class="icon">
        <ng-container [ngSwitch]="item.icon">
          <svg *ngSwitchCase="'dashboard'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="4" y="4" width="6.5" height="6.5" rx="1.8" stroke="currentColor" stroke-width="1.8"/>
            <rect x="13.5" y="4" width="6.5" height="10.5" rx="1.8" stroke="currentColor" stroke-width="1.8"/>
            <rect x="4" y="13.5" width="6.5" height="6.5" rx="1.8" stroke="currentColor" stroke-width="1.8"/>
            <rect x="13.5" y="17.5" width="6.5" height="2.5" rx="1.25" stroke="currentColor" stroke-width="1.8"/>
          </svg>
          <svg *ngSwitchCase="'attendance'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 4.75V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M17 4.75V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <rect x="4" y="6.5" width="16" height="13.5" rx="3" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 10.5H20" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 14.2 11.1 16.3 15.4 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg *ngSwitchCase="'alerts'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 4.8 20 18.5a1 1 0 0 1-.86 1.5H4.86A1 1 0 0 1 4 18.5L12 4.8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M12 9.5V13.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="16.4" r="0.95" fill="currentColor"/>
          </svg>
          <svg *ngSwitchCase="'config'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 7h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M5 17h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M9 12h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="17.5" cy="7" r="2.4" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="6.5" cy="12" r="2.4" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="14.5" cy="17" r="2.4" stroke="currentColor" stroke-width="1.8"/>
          </svg>
          <svg *ngSwitchCase="'status'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 7.5h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M7 12h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M7 16.5h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <rect x="4" y="4.5" width="16" height="15" rx="3" stroke="currentColor" stroke-width="1.8"/>
          </svg>
          <svg *ngSwitchCase="'account'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8.2" r="3.2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M5.5 18.5a6.5 6.5 0 0 1 13 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M18.2 8.5h2.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M19.5 7.2v2.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg *ngSwitchCase="'export'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3.8V13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8.6 9.7 12 13.1l3.4-3.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 15.5v1.8A2.7 2.7 0 0 0 7.7 20h8.6a2.7 2.7 0 0 0 2.7-2.7v-1.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </ng-container>
      </span>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <button type="button" class="public-link" (click)="goToPublicPage()">Public</button>
  </div>
</aside>
