<article
  class="kpi-card"
  [class.solid]="variant === 'solid'"
  [class.clickable]="clickable"
  [class]="'tone-' + tone"
  [attr.tabindex]="clickable ? 0 : null"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onClick()">
  <div class="kpi-icon">
    <ng-container [ngSwitch]="icon">
      <svg *ngSwitchCase="'present'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="9" cy="8.2" r="2.8" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4.8 18.2a4.2 4.2 0 0 1 8.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M15.8 10.2 18 12.4l3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'absent'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="9" cy="8.2" r="2.8" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4.8 18.2a4.2 4.2 0 0 1 8.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="m16 10.5 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="m20 10.5-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <svg *ngSwitchCase="'travel'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 14.5 19.5 6.8c.9-.48 1.82.43 1.34 1.33L13.2 22.5c-.36.67-1.37.56-1.57-.17l-1.45-5.26-5.26-1.45c-.73-.2-.84-1.21-.17-1.57Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'leave'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="4.5" y="6.2" width="15" height="13" rx="3" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 4.5v3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M16 4.5v3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M4.5 10h15" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <svg *ngSwitchCase="'rate'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="m5 16 4-4 3 3 6-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 8h3.5v3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'alert'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 4.8 20 18.5a1 1 0 0 1-.86 1.5H4.86A1 1 0 0 1 4 18.5L12 4.8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M12 9.5V13.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="16.4" r="0.95" fill="currentColor"/>
      </svg>
      <svg *ngSwitchCase="'late'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
        <path d="M12 7.8v4.5l3.1 1.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'hours'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="4.5" y="5" width="15" height="14" rx="3" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8.2 9.2h7.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8.2 13h7.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="9" cy="8.4" r="2.8" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="16.5" cy="9.6" r="2.4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4.7 18.3a4.3 4.3 0 0 1 8.6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M14 18.3a3.3 3.3 0 0 1 6.6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </ng-container>
  </div>
  <div class="kpi-content">
    <span class="kpi-title">{{ title }}</span>
    <strong class="kpi-value">{{ value }}</strong>
    <span class="kpi-note" *ngIf="note">{{ note }}</span>
    <span class="kpi-subtitle" *ngIf="subtitle">{{ subtitle }}</span>
  </div>
  <div class="kpi-ghost" aria-hidden="true">
    <ng-container [ngSwitch]="icon">
      <svg *ngSwitchCase="'present'" viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="8.2" r="2.8" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4.8 18.2a4.2 4.2 0 0 1 8.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M15.8 10.2 18 12.4l3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'absent'" viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="8.2" r="2.8" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4.8 18.2a4.2 4.2 0 0 1 8.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="m16 10.5 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="m20 10.5-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <svg *ngSwitchCase="'travel'" viewBox="0 0 24 24" fill="none">
        <path d="M5 14.5 19.5 6.8c.9-.48 1.82.43 1.34 1.33L13.2 22.5c-.36.67-1.37.56-1.57-.17l-1.45-5.26-5.26-1.45c-.73-.2-.84-1.21-.17-1.57Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'leave'" viewBox="0 0 24 24" fill="none">
        <rect x="4.5" y="6.2" width="15" height="13" rx="3" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 4.5v3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M16 4.5v3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M4.5 10h15" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <svg *ngSwitchCase="'rate'" viewBox="0 0 24 24" fill="none">
        <path d="m5 16 4-4 3 3 6-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 8h3.5v3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'alert'" viewBox="0 0 24 24" fill="none">
        <path d="M12 4.8 20 18.5a1 1 0 0 1-.86 1.5H4.86A1 1 0 0 1 4 18.5L12 4.8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M12 9.5V13.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="16.4" r="0.95" fill="currentColor"/>
      </svg>
      <svg *ngSwitchCase="'late'" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
        <path d="M12 7.8v4.5l3.1 1.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg *ngSwitchCase="'hours'" viewBox="0 0 24 24" fill="none">
        <rect x="4.5" y="5" width="15" height="14" rx="3" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8.2 9.2h7.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8.2 13h7.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="8.4" r="2.8" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="16.5" cy="9.6" r="2.4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4.7 18.3a4.3 4.3 0 0 1 8.6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M14 18.3a3.3 3.3 0 0 1 6.6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </ng-container>
  </div>
</article>
